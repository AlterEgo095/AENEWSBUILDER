# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aenews-builder
  labels:
    app.kubernetes.io/part-of: aenews-builder
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution (required for all pods)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: aenews-builder
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow API -> Postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-postgres
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: postgres
      component: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
              component: backend
      ports:
        - protocol: TCP
          port: 5432
---
# Allow API -> Redis (master + replica + sentinel)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-redis
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
              component: backend
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
---
# Allow API -> Execution Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-execution
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: execution-service
      component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
              component: backend
      ports:
        - protocol: TCP
          port: 3010
---
# Allow Worker -> Postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-to-postgres
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: postgres
      component: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: worker
              component: backend
      ports:
        - protocol: TCP
          port: 5432
---
# Allow Worker -> Redis (master + replica + sentinel)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-to-redis
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: worker
              component: backend
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
---
# Allow Ingress -> API, Studio, Admin
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-services
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      component: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3001
---
# Allow Ingress -> API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: api
      component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
---
# Allow Prometheus to scrape all pods for metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: aenews-builder
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
              component: monitoring
      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9121
        - protocol: TCP
          port: 3010
        - protocol: TCP
          port: 3000
---
# DENY external access to execution-service
# (only internal api can reach it - already handled by allow-api-to-execution)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-external-to-execution
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: execution-service
      component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# Allow Redis replication traffic between master/replica/sentinel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-internal
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: redis
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
---
# Allow API egress to postgres, redis, execution-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: api
      component: backend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
    - to:
        - podSelector:
            matchLabels:
              app: execution-service
      ports:
        - protocol: TCP
          port: 3010
---
# Allow Worker egress to postgres, redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-egress
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: worker
      component: backend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
---
# Allow execution-service egress (Docker pulls + DB/Redis)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-execution-egress
  namespace: aenews-builder
spec:
  podSelector:
    matchLabels:
      app: execution-service
      component: backend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - {}  # Allow all external egress for Docker image pulls
