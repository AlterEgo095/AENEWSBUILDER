apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aenews-builder
  labels:
    app: postgres
    component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app: postgres
    component: database
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: aenews-builder
  labels:
    app: postgres
    component: database
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app: postgres
    component: database
