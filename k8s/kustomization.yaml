apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aenews-builder

commonLabels:
  app.kubernetes.io/part-of: aenews-builder
  app.kubernetes.io/managed-by: kustomize

resources:
  # Namespace
  - namespace.yaml

  # ConfigMaps & Secrets
  - configmap.yaml
  - secrets.yaml

  # PostgreSQL
  - postgres/configmap.yaml
  - postgres/pvcs.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml

  # Redis
  - redis/statefulset-master.yaml
  - redis/statefulset-replica.yaml
  - redis/statefulset-sentinel.yaml
  - redis/service-master.yaml
  - redis/service-replica.yaml
  - redis/service-sentinel.yaml

  # API
  - api/deployment.yaml
  - api/service.yaml
  - api/hpa.yaml
  - api/pdb.yaml

  # Worker
  - worker/deployment.yaml
  - worker/hpa.yaml
  - worker/pdb.yaml

  # Studio
  - studio/deployment.yaml
  - studio/service.yaml
  - studio/pdb.yaml

  # Admin
  - admin/deployment.yaml
  - admin/service.yaml
  - admin/pdb.yaml

  # Execution Service
  - execution-service/deployment.yaml
  - execution-service/service.yaml
  - execution-service/pdb.yaml

  # Monitoring
  - monitoring/prometheus-configmap.yaml
  - monitoring/prometheus-deployment.yaml
  - monitoring/prometheus-service.yaml
  - monitoring/grafana-configmap.yaml
  - monitoring/grafana-deployment.yaml
  - monitoring/grafana-service.yaml

  # Networking
  - ingress.yaml
  - networkpolicies.yaml
  - poddisruptionbudgets.yaml

images:
  - name: aenews-builder/api
    newTag: latest
  - name: aenews-builder/studio
    newTag: latest
  - name: aenews-builder/admin
    newTag: latest
  - name: aenews-builder/execution-service
    newTag: latest

replicas:
  - name: api
    count: 3
  - name: worker
    count: 2
  - name: studio
    count: 2
  - name: admin
    count: 2
  - name: execution-service
    count: 2
