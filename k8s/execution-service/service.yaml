apiVersion: v1
kind: Service
metadata:
  name: execution-service
  namespace: aenews-builder
  labels:
    app: execution-service
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 3010
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: execution-service
    component: backend
