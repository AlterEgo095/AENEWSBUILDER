apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: aenews-builder
  labels:
    app: redis
    component: sentinel
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 26379
      targetPort: sentinel
      protocol: TCP
      name: sentinel
  selector:
    app: redis
    component: sentinel
