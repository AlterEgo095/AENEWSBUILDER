apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sentinel
  namespace: aenews-builder
  labels:
    app: redis
    component: sentinel
    app.kubernetes.io/part-of: aenews-builder
spec:
  serviceName: redis-sentinel
  replicas: 3
  selector:
    matchLabels:
      app: redis
      component: sentinel
  template:
    metadata:
      labels:
        app: redis
        component: sentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
      initContainers:
        - name: replace-redis-password
          image: busybox
          command:
            - sh
            - -c
            - |
              REDIS_PWD="${REDIS_PASSWORD}"
              for f in /etc/redis/*.conf; do
                sed -i "s/REPLACE_REDIS_PASSWORD/${REDIS_PWD}/g" "$f"
              done
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aenews-builder-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
      containers:
        - name: redis-sentinel
          image: redis:7-alpine
          command:
            - redis-sentinel
            - /etc/redis/sentinel.conf
          ports:
            - containerPort: 26379
              name: sentinel
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aenews-builder-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -p
                - "26379"
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -p
                - "26379"
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: redis-config
          configMap:
            name: redis-sentinel-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-sentinel-config
  namespace: aenews-builder
  labels:
    app: redis
    component: sentinel
data:
  sentinel.conf: |
    port 26379
    sentinel monitor mymaster redis-master-0.redis-master 6379 2
    sentinel auth-pass mymaster REPLACE_REDIS_PASSWORD
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 10000
    sentinel parallel-syncs mymaster 1
    bind 0.0.0.0
    protected-mode yes
    requirepass REPLACE_REDIS_PASSWORD
    daemonize no
    logfile ""
    dir /tmp
