apiVersion: v1
kind: Secret
metadata:
  name: aenews-builder-secrets
  namespace: aenews-builder
  labels:
    app.kubernetes.io/part-of: aenews-builder
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME_VAULT_POSTGRES_PASSWORD"
  REDIS_PASSWORD: "CHANGE_ME_VAULT_REDIS_PASSWORD"
  JWT_SECRET: "CHANGE_ME_VAULT_JWT_SECRET"
  DATABASE_URL: "postgresql://aenews:CHANGE_ME_VAULT_POSTGRES_PASSWORD@postgres-0.postgres-headless:5432/aenews_builder"
  DATABASE_READ_URL: "postgresql://aenews:CHANGE_ME_VAULT_POSTGRES_PASSWORD@postgres-0.postgres-headless:5432/aenews_builder"
  OPENAI_API_KEY: "CHANGE_ME_VAULT_OPENAI_API_KEY"
  ANTHROPIC_API_KEY: "CHANGE_ME_VAULT_ANTHROPIC_API_KEY"
  DASHSCOPE_API_KEY: "CHANGE_ME_VAULT_DASHSCOPE_API_KEY"
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME_VAULT_GRAFANA_ADMIN_PASSWORD"
