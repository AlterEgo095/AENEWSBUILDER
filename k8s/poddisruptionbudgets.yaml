# Centralized PDBs for stateful services
# NOTE: postgres-pdb removed - meaningless for single-replica StatefulSet
# (maxUnavailable:1 would block node drains since 1-1=0 pods available)
# Re-add with appropriate minAvailable when replicas > 1
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-master-pdb
  namespace: aenews-builder
  labels:
    app: redis
    component: master
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: redis
      component: master
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-sentinel-pdb
  namespace: aenews-builder
  labels:
    app: redis
    component: sentinel
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: redis
      component: sentinel
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: prometheus-pdb
  namespace: aenews-builder
  labels:
    app: prometheus
    component: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: prometheus
      component: monitoring
