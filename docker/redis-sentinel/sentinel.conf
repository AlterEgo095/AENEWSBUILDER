# Passwords should be injected via environment variables or secrets management
port 26379
sentinel resolve-hostnames no
sentinel announce-hostnames no
sentinel monitor aenewsb_master 172.30.0.3 6379 2
sentinel down-after-milliseconds aenewsb_master 5000
sentinel failover-timeout aenewsb_master 10000
sentinel parallel-syncs aenewsb_master 1
sentinel auth-pass aenewsb_master ${REDIS_PASSWORD}
