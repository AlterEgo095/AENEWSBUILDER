services:
  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: aenews-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aenews
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: aenews_builder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ⚠️ NO port exposure in production — access via Docker network only
    # Uncomment below for local dev:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aenews"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ============================================
  # REDIS (Queue + Cache + Pub/Sub)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: aenews-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes
    volumes:
      - redis_data:/data
    # ⚠️ NO port exposure in production — access via Docker network only
    # Uncomment below for local dev:
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD:?REDIS_PASSWORD must be set} redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ============================================
  # API GATEWAY
  # ============================================
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: aenews-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://aenews:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/aenews_builder?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      API_PORT: 3001
      API_HOST: 0.0.0.0
    env_file:
      - .env
    # ⚠️ Only nginx needs to reach the API — not exposed to host in production
    # Uncomment below for local dev:
    # ports:
    #   - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  # ============================================
  # FRONTEND STUDIO
  # ============================================
  studio:
    build:
      context: .
      dockerfile: ./apps/studio/Dockerfile
    container_name: aenews-studio
    restart: unless-stopped
    environment:
      NODE_ENV: production
    # ⚠️ Nginx reverse proxy handles routing — no direct host exposure needed
    # Uncomment below for local dev:
    # ports:
    #   - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ============================================
  # ADMIN DASHBOARD
  # ============================================
  admin:
    build:
      context: .
      dockerfile: ./apps/admin/Dockerfile
    container_name: aenews-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
    # ⚠️ Nginx reverse proxy handles routing — no direct host exposure needed
    # Uncomment below for local dev:
    # ports:
    #   - "5174:5174"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ============================================
  # NGINX REVERSE PROXY (single entry point)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: aenews-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      studio:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # ============================================
  # PROMETHEUS (Monitoring)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: aenews-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    # ⚠️ Monitoring not exposed to public — access via nginx or SSH tunnel
    # Uncomment below for local dev:
    # ports:
    #   - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ============================================
  # GRAFANA (Dashboards)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: aenews-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: false
    # ⚠️ Grafana not exposed to public — access via nginx or SSH tunnel
    # Uncomment below for local dev:
    # ports:
    #   - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aenews_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  aenews_network:
    driver: bridge
