version: '3.8'

services:
  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: aenews-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aenews
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aenews_secure_password}
      POSTGRES_DB: aenews_builder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aenews"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aenews_network

  # ============================================
  # REDIS (Queue + Cache + Pub/Sub)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: aenews-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-aenews_redis_secure_password} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aenews_redis_secure_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aenews_network

  # ============================================
  # API GATEWAY
  # ============================================
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: aenews-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://aenews:${POSTGRES_PASSWORD:-aenews_secure_password}@postgres:5432/aenews_builder?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-aenews_redis_secure_password}
      API_PORT: 3001
      API_HOST: 0.0.0.0
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro
    networks:
      - aenews_network

  # ============================================
  # FRONTEND STUDIO
  # ============================================
  studio:
    build:
      context: .
      dockerfile: ./apps/studio/Dockerfile
    container_name: aenews-studio
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - aenews_network

  # ============================================
  # NGINX REVERSE PROXY
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: aenews-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - studio
    networks:
      - aenews_network

  # ============================================
  # PROMETHEUS (Monitoring)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: aenews-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aenews_network

  # ============================================
  # GRAFANA (Dashboards)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: aenews-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aenews_network

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  aenews_network:
    driver: bridge
