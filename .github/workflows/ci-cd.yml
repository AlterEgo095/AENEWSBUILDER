name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.0.0'

jobs:
  # ============================================
  # LINT & TYPE CHECK
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install
      - run: pnpm run typecheck
      - run: pnpm run lint 2>/dev/null || echo "Lint script not configured"

  # ============================================
  # BUILD
  # ============================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install
      - run: pnpm run build

  # ============================================
  # TEST
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aenews_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aenews_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate
        env:
          DATABASE_URL: postgresql://aenews_test:test_password@localhost:5432/aenews_test

      - name: Run Tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://aenews_test:test_password@localhost:5432/aenews_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          NODE_ENV: test

  # ============================================
  # DEPLOY (main branch only)
  # ============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aenews-builder
            git pull origin main
            docker-compose build
            docker-compose up -d
            sleep 10
            curl -f http://localhost:3001/api/health || exit 1
