name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # LINT & TYPE CHECK
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run lint

  # ============================================
  # BUILD
  # ============================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm run build

  # ============================================
  # TEST
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aenews_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aenews_builder
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate
        env:
          DATABASE_URL: postgresql://aenews_test:test_password@localhost:5432/aenews_builder

      - name: Run Tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://aenews_test:test_password@localhost:5432/aenews_builder
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci-that-is-long-enough-32chars
          OPENAI_API_KEY: sk-test-key
          ANTHROPIC_API_KEY: sk-ant-test-key
          FRONTEND_URL: http://localhost:5173
          CORS_ORIGINS: http://localhost:5173
          NODE_ENV: test

  # ============================================
  # DEPLOY TO VPS (main branch only)
  # ============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aenews-builder
            git pull origin main
            docker compose build
            docker compose up -d
            echo "Waiting for API to be ready..."
            sleep 15
            echo "Running database migrations..."
            docker compose exec -T api npx prisma migrate deploy
            echo "Running health check..."
            curl -sf http://localhost/api/health || {
              echo "❌ Health check failed! Deployment may be broken."
              echo "📋 Manual rollback instructions:"
              echo "   1. SSH to VPS: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
              echo "   2. Rollback containers: docker compose down && docker tag aenews-builder-api:previous aenews-builder-api:latest && docker compose up -d"
              echo "   3. Or rollback code: git checkout <previous-commit> && docker compose build && docker compose up -d"
              echo "   4. Check logs: docker compose logs api"
              exit 1
            }
            echo "Deploy successful!"
